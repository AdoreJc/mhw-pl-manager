name: Build Windows EXE on Release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-exe:
    name: build (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: amd64
            python_arch: x64
            asset_suffix: win-amd64
          - target: x86
            python_arch: x86
            asset_suffix: win-x86

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE (PyInstaller)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $rawTag = "${{ github.ref_name }}"
          $version = $rawTag
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          $initPath = "mhw_pl_manager/__init__.py"
          $initText = Get-Content -Raw -Encoding UTF8 $initPath
          $initText = $initText -replace '__version__\s*=\s*"[^\"]+"', "__version__ = `"$version`""
          Set-Content -Encoding UTF8 -NoNewline -Path $initPath -Value $initText
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --name "mhw-pl-manager" `
            --hidden-import "mhw_pl_manager" `
            --hidden-import "mhw_pl_manager.main" `
            --add-data "static;static" `
            --add-data "data;data" `
            "mhw_pl_manager/__main__.py"
          $exeName = "mhw-pl-manager-$version-${{ matrix.asset_suffix }}.exe"
          $zipName = "mhw-pl-manager-$version-${{ matrix.asset_suffix }}.zip"
          Move-Item -Force "dist/mhw-pl-manager.exe" "dist/$exeName"
          $proc = Start-Process -FilePath "dist/$exeName" -PassThru
          try {
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $resp = Invoke-WebRequest -Uri "http://127.0.0.1:8765/api/health" -UseBasicParsing -TimeoutSec 2
                if ($resp.StatusCode -eq 200) {
                  $ok = $true
                  break
                }
              } catch {}
            }
            if (-not $ok) {
              throw "Smoke test failed: /api/health not reachable from packaged exe."
            }
          } finally {
            if ($null -ne $proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }
          Compress-Archive -Path "dist/$exeName" -DestinationPath "dist/$zipName" -Force

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mhw-pl-manager-*-${{ matrix.asset_suffix }}.zip
